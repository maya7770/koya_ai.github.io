<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — KOYA AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="big-logo">✦</div>
      <h2>Welcome back</h2>
      <p>Sign in to your KOYA account</p>
    </div>
    <div class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="alex@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" />
      </div>
      <button class="auth-submit" onclick="window.location.href='dashboard.html'">Sign In</button>
    </div>
    <div class="auth-switch">
      Don't have an account? <a href="onboarding.html">Get started free</a>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
