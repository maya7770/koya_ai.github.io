<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding — KOYA AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="onboarding-wrap">
  <div class="onboarding-card">
    <div class="step-header">
      <span class="step-label" id="stepLabel">Step 1 of 4</span>
      <span class="step-pct" id="obPct">25%</span>
    </div>
    <div class="step-progress">
      <div class="step-progress-fill" id="obFill" style="width:25%"></div>
    </div>

    <div class="ob-chat" id="obChat">
      <div class="ob-msg">
        <div class="ob-avatar">✦</div>
        <div class="ob-bubble">Hi! I'm KOYA, your AI mentor. Let's get to know you better so I can help you grow! 🌱</div>
      </div>
    </div>

    <div class="choices" id="obChoices"></div>
    <div class="ob-input-area" id="obInputArea" style="display:none">
      <input type="text" id="obInput" placeholder="Type your answer here..." />
      <button class="send-btn" onclick="handleObInput()">➤</button>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
